skills:
  - name: 'Core Caching'
    slug: 'core'
    domain: 'caching'
    description: 'Setting up Gorgon, caching async functions with get/put/clear/overwrite, configuring expiry policies, key naming, concurrency deduplication, hooks, custom storage providers, file provider, and ClearLink distributed cache clearing'
    type: 'core'
    covers:
      - 'Gorgon.get'
      - 'Gorgon.put'
      - 'Gorgon.clear (with wildcards)'
      - 'Gorgon.clearAll'
      - 'Gorgon.overwrite'
      - 'Gorgon.settings'
      - 'Gorgon.addProvider'
      - 'Gorgon.addHook'
      - 'GorgonPolicyInput (expiry as ms, Date, false, or policy object)'
      - 'IGorgonCacheProvider interface'
      - '@gorgonjs/file-provider'
      - '@gorgonjs/clearlink'
    tasks:
      - 'Cache an HTTP or database call'
      - 'Set up cache expiry policies'
      - 'Clear related caches after data mutation'
      - 'Use wildcard keys for grouped invalidation'
      - 'Add a custom storage provider (Redis, file, etc.)'
      - 'Sync cache clearing across server instances'
      - 'Monitor cache lifecycle with hooks'
      - 'Warm caches with fuzzed expiry times'
    failure_modes:
      - mistake: 'Not clearing cache after mutating underlying data'
        mechanism: 'Developer caches a GET result but forgets to call Gorgon.clear() after a PUT/POST/DELETE that changes the same data, serving stale results'
        wrong_pattern: |
          // Caches user profile
          const user = await Gorgon.get(`user/${id}`, () => fetchUser(id), 60000);
          // Updates user but forgets to clear cache
          await updateUser(id, newData);
        correct_pattern: |
          const user = await Gorgon.get(`user/${id}`, () => fetchUser(id), 60000);
          await updateUser(id, newData);
          Gorgon.clear(`user/${id}`);
        source: 'maintainer interview'
        priority: 'CRITICAL'
        status: 'active'
      - mistake: 'Cache keys not specific enough to input parameters'
        mechanism: 'Developer uses a generic key that does not include all varying parameters, causing different requests to share the same cached result'
        wrong_pattern: |
          // Same cache key regardless of filters
          const results = await Gorgon.get('search-results', () =>
            searchAPI(query, page, filters), 60000);
        correct_pattern: |
          // Serialize all input params into the key
          const results = await Gorgon.get(
            `search/${query}/${page}/${JSON.stringify(filters)}`,
            () => searchAPI(query, page, filters), 60000);
        source: 'maintainer interview'
        priority: 'CRITICAL'
        status: 'active'
      - mistake: 'Caching forever without expiry in production'
        mechanism: 'Using false or omitting policy leads to permanently stale data; always set an expiry even if long (e.g. days)'
        wrong_pattern: |
          await Gorgon.get('config', fetchConfig, false);
        correct_pattern: |
          // Even rarely-changing data should have an expiry
          await Gorgon.get('config', fetchConfig, 24 * 60 * 60 * 1000); // 1 day
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Aligned cache expiry causing thundering herd'
        mechanism: 'When many cached items use the same TTL, they all expire simultaneously causing a burst of requests. Fuzz the expiry times.'
        wrong_pattern: |
          // All items expire at exactly the same time
          for (const id of popularIds) {
            await Gorgon.get(`item/${id}`, () => fetchItem(id), 3600000);
          }
        correct_pattern: |
          // Fuzz expiry to spread out cache refreshes
          for (const id of popularIds) {
            const fuzz = Math.random() * 600000; // up to 10 min variance
            await Gorgon.get(`item/${id}`, () => fetchItem(id), 3600000 + fuzz);
          }
        source: 'maintainer interview'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'Using language primitives instead of Gorgon for caching'
        mechanism: 'AI agents may implement caching with a plain Map or global object, missing concurrency deduplication, expiry, and type safety'
        wrong_pattern: |
          const cache = new Map();
          async function getUser(id) {
            if (cache.has(id)) return cache.get(id);
            const user = await fetchUser(id);
            cache.set(id, user);
            return user;
          }
        correct_pattern: |
          import Gorgon from '@gorgonjs/gorgon';
          const getUser = (id: number) =>
            Gorgon.get(`user/${id}`, () => fetchUser(id), 60000);
        source: 'documentation analysis'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Wrapping Gorgon.get in custom deduplication logic'
        mechanism: 'Gorgon already deduplicates concurrent requests for the same key; adding external dedup is redundant and can cause bugs'
        wrong_pattern: |
          const pending = new Map();
          async function getUser(id) {
            if (pending.has(id)) return pending.get(id);
            const promise = Gorgon.get(`user/${id}`, () => fetchUser(id), 60000);
            pending.set(id, promise);
            const result = await promise;
            pending.delete(id);
            return result;
          }
        correct_pattern: |
          // Gorgon handles deduplication automatically
          const getUser = (id: number) =>
            Gorgon.get(`user/${id}`, () => fetchUser(id), 60000);
        source: 'documentation — concurrency'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'React Integration'
    slug: 'react'
    domain: 'react'
    description: 'Using the @gorgonjs/react useGorgon hook for cached data fetching in React components with loading, error, and refetch support'
    type: 'framework'
    covers:
      - 'useGorgon hook'
      - 'clearGorgon helper'
      - 'loading/error/refetch state management'
      - 'DIY hook pattern'
    tasks:
      - 'Fetch and cache data in a React component'
      - 'Handle loading and error states'
      - 'Refetch or invalidate cached data from a component'
      - 'Build a custom useGorgon hook'
    failure_modes:
      - mistake: 'Not cleaning up on unmount in DIY hooks'
        mechanism: 'Setting state after component unmounts causes React warnings; the mounted flag pattern is required'
        wrong_pattern: |
          useEffect(() => {
            Gorgon.get(key, asyncFunc, policy).then(setData);
          }, [key]);
        correct_pattern: |
          useEffect(() => {
            let mounted = true;
            Gorgon.get(key, asyncFunc, policy)
              .then(result => { if (mounted) setData(result); });
            return () => { mounted = false; };
          }, [key]);
        source: 'documentation — react'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Using Gorgon.clear without triggering re-render'
        mechanism: 'Calling Gorgon.clear directly does not cause the React component to refetch; use the refetch function from useGorgon instead'
        wrong_pattern: |
          const { data } = useGorgon('user/1', fetchUser, 60000);
          const handleUpdate = async () => {
            await updateUser(1, newData);
            Gorgon.clear('user/1'); // component won't re-render
          };
        correct_pattern: |
          const { data, refetch } = useGorgon('user/1', fetchUser, 60000);
          const handleUpdate = async () => {
            await updateUser(1, newData);
            refetch(); // clears cache AND triggers re-render
          };
        source: 'documentation — react'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Not including all params in the cache key for useGorgon'
        mechanism: 'useGorgon re-fetches when the key changes; if dynamic params are not in the key, stale data is shown'
        wrong_pattern: |
          const { data } = useGorgon('user-profile', () => fetchUser(userId), 60000);
        correct_pattern: |
          const { data } = useGorgon(`user/${userId}`, () => fetchUser(userId), 60000);
        source: 'documentation — react'
        priority: 'CRITICAL'
        status: 'active'

tensions:
  - name: 'Cache duration vs data freshness'
    skills: ['core', 'react']
    description: 'Longer cache times improve performance but increase risk of stale data; shorter times reduce staleness but increase load'
    implication: 'An agent optimizing for performance will set long TTLs without considering invalidation strategy; an agent optimizing for correctness will set short TTLs defeating the purpose of caching'
  - name: 'Key specificity vs cache hit rate'
    skills: ['core', 'react']
    description: 'More specific keys prevent stale cross-contamination but reduce cache sharing; less specific keys increase hits but risk serving wrong data'
    implication: 'An agent may over-serialize keys (including timestamps or request IDs) making the cache useless, or under-serialize (missing filter params) causing wrong results'

